<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marketplace de Ofertas de Medios</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAFA;
    --surface: #FFFFFF;
    --ink: #0A0A0A;
    --ink-2: #171717;
    --ink-soft: #525252;
    --ink-mute: #A3A3A3;
    --line: #EAEAEA;
    --line-soft: #F0F0F0;
    --accent: #D4FF3A;        /* verde lima neón */
    --accent-ink: #0A0A0A;    /* texto sobre acento */
    --accent-soft: #EDFFAD;   /* soft version */
  }

  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  html, body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-feature-settings: "ss01" on, "cv11" on;
  }

  .num { font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }

  /* === CARD === */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 24px;
    transition: all .35s cubic-bezier(.22,.61,.36,1);
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--ink);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px -20px rgba(10,10,10,0.15), 0 8px 16px -8px rgba(10,10,10,0.08);
  }

  /* Corner tag visible on hover */
  .card::after {
    content: '';
    position: absolute;
    top: 16px; right: 16px;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    transform: scale(0);
    transition: all .4s cubic-bezier(.22,.61,.36,1);
  }
  .card:hover::after {
    opacity: 1;
    transform: scale(1);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  /* === CTA === */
  .cta {
    background: var(--ink);
    color: var(--surface);
    border-radius: 999px;
    font-weight: 600;
    transition: all .3s cubic-bezier(.22,.61,.36,1);
    position: relative;
    overflow: hidden;
  }
  .cta-text, .cta-arrow {
    position: relative; z-index: 2;
    transition: transform .4s cubic-bezier(.22,.61,.36,1), color .25s ease;
  }
  .cta::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    border-radius: 999px;
    transform: scale(0);
    transform-origin: center;
    transition: transform .5s cubic-bezier(.22,.61,.36,1);
    z-index: 1;
  }
  .cta:hover::before { transform: scale(1.1); }
  .cta:hover .cta-text, .cta:hover .cta-arrow { color: var(--accent-ink); }
  .cta:hover .cta-arrow { transform: translateX(4px); }

  /* === FILTERS (pills) === */
  .pill {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    transition: all .25s ease;
  }
  .pill:hover { border-color: var(--ink); }
  .pill.active {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }
  .pill.active .pill-count {
    background: var(--accent);
    color: var(--accent-ink);
  }

  /* === BADGE === */
  .badge-accent {
    background: var(--accent);
    color: var(--accent-ink);
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .badge-ink {
    background: var(--ink);
    color: var(--surface);
    border-radius: 999px;
    font-weight: 600;
  }
  .badge-ghost {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink-soft);
    font-weight: 500;
  }

  /* === DATA TABLE === */
  .data-table th {
    color: var(--ink-mute);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .data-table td {
    padding: 12px 0;
    border-bottom: 1px solid var(--line-soft);
    font-size: 13px;
  }
  .data-table tr:last-child td { border-bottom: 0; }

  /* === STATS === */
  .stat-block {
    background: #F5F5F5;
    border-radius: 16px;
    padding: 16px;
    transition: background .25s ease;
  }
  .stat-block:hover { background: var(--accent-soft); }

  /* === SPLIT DIVIDER === */
  .split-line {
    background: repeating-linear-gradient(to right, var(--line-soft) 0, var(--line-soft) 4px, transparent 4px, transparent 8px);
    height: 1px;
  }

  /* === HEADER GRADIENT BLOB === */
  .hero-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    pointer-events: none;
  }

  /* === STAGGER === */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .stagger { animation: slideUp .6s cubic-bezier(.22,.61,.36,1) backwards; }

  /* === PULSE DOT === */
  .pulse-dot {
    position: relative;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  .pulse-dot::before {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.4;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.4; }
    100% { transform: scale(2); opacity: 0; }
  }

  /* === SCROLLBAR === */
  .scroll-slim::-webkit-scrollbar { height: 4px; }
  .scroll-slim::-webkit-scrollbar-track { background: transparent; }
  .scroll-slim::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

  /* === MAP DOT ANIMATION === */
  @keyframes mapPulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.4); opacity: 0.1; }
  }
  .map-pulse { animation: mapPulse 2.5s ease-in-out infinite; }

  /* Price emphasis */
  .price-mega {
    font-weight: 800;
    letter-spacing: -0.035em;
    line-height: 0.95;
  }

  /* Headline treatment */
  .headline {
    letter-spacing: -0.04em;
    line-height: 0.95;
  }

  /* Underline link hover */
  .link-under {
    background-image: linear-gradient(currentColor, currentColor);
    background-size: 100% 1px;
    background-position: 0 100%;
    background-repeat: no-repeat;
    transition: background-size .3s;
  }
  .link-under:hover { background-size: 0% 1px; }

</style>
</head>

/* =======================================================================

   ======================================================================= */

    switch (data.oferta.tipo_comercial) {
      case "PATROCINIO_MENSUAL":   return <RenderPatrocinio data={data} />;
      case "PARRILLA_SPOTS":       return <RenderParrilla   data={data} />;
      case "OOH_ESTATICA":         return <RenderOOH        data={data} />;
      case "PUBLICACION_IMPRESA":  return <RenderImpreso    data={data} />;
      default: return null;
    }
  };

  return (
    <article
      className="card stagger p-6 flex flex-col"
      style={{ animationDelay: `${index * 0.08}s` }}
    >
      {/* Header: Logo + tipo + destacado */}
      <div className="flex items-start justify-between mb-5">
        <div className="flex items-center gap-3">
          <LogoMark medio={data.medio} />
          <div>
            <div className="text-sm font-bold text-neutral-900">{data.medio.nombre}</div>
            <div className="text-xs text-neutral-500">{data.medio.tagline}</div>
          </div>
        </div>
        <div className="flex items-center gap-1.5 badge-ghost px-2.5 py-1 text-[10px]">
          <span className="w-1.5 h-1.5 rounded-full" style={{ background: meta.dot }}></span>
          <span>{meta.label}</span>
        </div>
      </div>

      {/* Título de la oferta */}
      <div className="mb-4">
        <h3 className="headline text-[26px] font-extrabold text-neutral-900 mb-1">
          {data.oferta.titulo}
        </h3>
        {data.oferta.subtitulo && (
          <p className="text-sm text-neutral-500 font-medium">{data.oferta.subtitulo}</p>
        )}
      </div>

      {/* Descripción */}
      <p className="text-[13px] text-neutral-600 leading-relaxed mb-5">
        {data.oferta.descripcion}
      </p>

      {/* Tags */}
      <div className="flex flex-wrap items-center gap-1.5 mb-6">
        <span className="badge-ghost px-2.5 py-1 text-[10px]">
          {data.vigencia}
        </span>
        {data.oferta.estacionalidad && (
          <span className="badge-accent px-2.5 py-1 text-[10px]">
            ✦ {data.oferta.estacionalidad}
          </span>
        )}
        {data.destacado && (
          <span className="badge-ink px-2.5 py-1 text-[10px] uppercase tracking-wider">
            Destacado
          </span>
        )}
      </div>

      {/* Body adaptativo */}
      <div className="flex-1 mb-6">
        {renderBody()}
      </div>

      {/* CTA */}
      <button className="cta w-full py-3.5 flex items-center justify-center gap-2 text-sm">
        <span className="cta-text">Me interesa esta oferta</span>
        <svg className="cta-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M5 12h14M13 5l7 7-7 7"/>
        </svg>
      </button>
    </article>
  );
};

/* =======================================================================
   HEADER / HERO
   ======================================================================= */

const Hero = ({ totalOfertas }) => {
  return (
    <header className="relative overflow-hidden">
      {/* Decorative blobs */}
      <div className="hero-blob" style={{ background: "#D4FF3A", top: "-100px", right: "10%", width: "400px", height: "400px" }}></div>
      <div className="hero-blob" style={{ background: "#6BCFFF", top: "50px", left: "-100px", width: "300px", height: "300px", opacity: 0.2 }}></div>

      {/* Top nav */}
      <nav className="relative max-w-7xl mx-auto px-6 py-5 flex items-center justify-between border-b border-neutral-200/60 z-10">
        <div className="flex items-center gap-2.5">
          <div className="relative w-9 h-9 rounded-xl flex items-center justify-center font-extrabold text-white bg-neutral-900">
            <span className="relative z-10">M+</span>
            <div className="absolute -top-1 -right-1 w-3 h-3 rounded-full" style={{ background: "var(--accent)" }}></div>
          </div>
          <div>
            <div className="text-sm font-extrabold tracking-tight">Media Marketplace</div>
            <div className="text-[10px] text-neutral-500 font-medium">Panel de Agencia</div>
          </div>
        </div>

        <div className="flex items-center gap-3">
          <div className="hidden md:flex items-center gap-2 text-xs font-semibold text-neutral-700">
            <div className="pulse-dot"></div>
            <span>{totalOfertas} ofertas activas</span>
          </div>
          <div className="w-9 h-9 rounded-full bg-neutral-900 text-white flex items-center justify-center text-xs font-extrabold">
            MA
          </div>
        </div>
      </nav>

      {/* Hero content */}
      <div className="relative max-w-7xl mx-auto px-6 py-16 z-10">
        <div className="max-w-4xl">
          <div className="inline-flex items-center gap-2 mb-6 badge-ghost px-3 py-1.5 text-[11px] font-semibold">
            <span className="w-1.5 h-1.5 rounded-full" style={{ background: "var(--accent)" }}></span>
            <span>Actualizado esta semana</span>
          </div>

          <h1 className="headline text-5xl md:text-7xl font-extrabold text-neutral-900 mb-5">
            Ofertas de medios,<br/>
            <span className="relative inline-block">
              listas para ti.
              <svg className="absolute -bottom-2 left-0 w-full" height="12" viewBox="0 0 400 12" preserveAspectRatio="none">
                <path d="M2 8 Q 100 2, 200 6 T 398 4" stroke="#D4FF3A" strokeWidth="6" fill="none" strokeLinecap="round"/>
              </svg>
            </span>
          </h1>

          <p className="text-lg text-neutral-600 font-medium max-w-2xl mb-8 leading-relaxed">
            TV, radio, exterior, impreso. Todas las propuestas que recibimos, analizadas y enlistadas para nuestros clientes.
          </p>

          {/* Quick stats inline */}
          <div className="flex flex-wrap items-center gap-6 md:gap-10">
            <InlineStat num={totalOfertas} label="Ofertas activas" />
            <div className="w-px h-10 bg-neutral-300 hidden sm:block"></div>
            <InlineStat num="4" label="Tipos de medio" />
            <div className="w-px h-10 bg-neutral-300 hidden sm:block"></div>
            <InlineStat num="RD$ 1.3M" label="Inversión disponible" />
          </div>
        </div>
      </div>
    </header>
  );
};

const InlineStat = ({ num, label }) => (
  <div>
    <div className="headline text-3xl font-extrabold text-neutral-900 num">{num}</div>
    <div className="text-xs text-neutral-500 font-semibold mt-1">{label}</div>
  </div>
);

/* =======================================================================
   APP
   ======================================================================= */

const App = () => {
  const [filter, setFilter] = useState("ALL");
  const filters = [
    { key: "ALL",     label: "Todas",    count: ofertas.length },
    { key: "TV",      label: "TV",       count: ofertas.filter(o => o.medio.tipo === "TV").length },
    { key: "RADIO",   label: "Radio",    count: ofertas.filter(o => o.medio.tipo === "RADIO").length },
    { key: "OOH",     label: "Exterior", count: ofertas.filter(o => o.medio.tipo === "OOH").length },
    { key: "IMPRESO", label: "Impreso",  count: ofertas.filter(o => o.medio.tipo === "IMPRESO").length }
  ];

  const visible = useMemo(
    () => filter === "ALL" ? ofertas : ofertas.filter(o => o.medio.tipo === filter),
    [filter]
  );

  return (
    <div className="min-h-screen">
      <Hero totalOfertas={ofertas.length} />

      <main className="max-w-7xl mx-auto px-6 py-12">
        {/* Section header + filters */}
        <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-5 mb-8">
          <div>
            <h2 className="headline text-3xl md:text-4xl font-extrabold text-neutral-900 mb-1">
              Disponibles ahora
            </h2>
            <p className="text-sm text-neutral-500 font-medium">
              {visible.length} {visible.length === 1 ? "oferta" : "ofertas"} · actualizado hace unos minutos
            </p>
          </div>
        </div>

        {/* Filter pills */}
        <div className="flex items-center gap-2 mb-10 overflow-x-auto scroll-slim pb-1 -mx-1 px-1">
          {filters.map(f => (
            <button
              key={f.key}
              onClick={() => setFilter(f.key)}
              className={`pill shrink-0 px-4 py-2 text-xs font-semibold flex items-center gap-2 ${filter === f.key ? "active" : ""}`}
            >
              <span>{f.label}</span>
              <span className={`pill-count text-[10px] px-1.5 py-0.5 rounded-full font-bold ${filter === f.key ? "" : "bg-neutral-100 text-neutral-500"}`}>
                {f.count}
              </span>
            </button>
          ))}
        </div>

        {/* Grid */}
        <div key={filter} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          {visible.map((oferta, i) => (
            <DynamicCard key={oferta.id} data={oferta} index={i} />
          ))}
        </div>

        {/* Footer */}
        <footer className="mt-20 pt-8 border-t border-neutral-200 flex items-center justify-between flex-wrap gap-3">
          <div className="flex items-center gap-2.5">
            <div className="relative w-7 h-7 rounded-lg flex items-center justify-center font-extrabold text-white bg-neutral-900 text-xs">
              M+
            </div>
            <div className="text-xs text-neutral-500 font-semibold">
              Media Marketplace · Panel Interno de Agencia
            </div>
          </div>
          <div className="text-xs text-neutral-400 font-medium">
            {visible.length} de {ofertas.length} ofertas mostradas
          </div>
        </footer>
      </main>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
